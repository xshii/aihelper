# FileInfo children emit order
# 默认排序键：class 内 (element 名, stem, full path)
# 特例语法：<element>:<stem> 精确 pin 单个 instance 到指定位置
- RatVersion
- ResTbl:CapacityRunModeMapTbl   # 特例：wrapper 形态先 emit（element=ResTbl）
- CapacityRunModeMapTbl           # 兜底：剩下的 flat 实例（element=CapacityRunModeMapTbl）
- RunModeTbl
- ClkCfgTbl
- DmaCfgTbl
- CoreDeployTbl
