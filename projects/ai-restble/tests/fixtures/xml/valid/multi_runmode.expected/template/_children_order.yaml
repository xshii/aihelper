# Top-level emit order — FileInfo (root) → list of child entries
# 子 list 仅 element-class 与 ``<element>:<stem>`` 特例两种 entry 形式
# 同 element 类内字母序为协议契约（XML 必须按相同顺序声明）
FileInfo:
- ResTbl:RatVersion              # 特例：RatVersion 必须在最前
- ResTbl:CapacityRunModeMapTbl   # 特例：wrapper 形态紧随其后（element=ResTbl）
- CapacityRunModeMapTbl          # CapacityRunModeMapTbl flat 实例
- RunModeTbl                     # RunModeTbl 实例
- ResTbl                         # 剩余 ResTbl wrappers (Cl, Cl_var, Co, Co_var, Dm 字母序)
