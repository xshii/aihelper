platform: emu
packager: EmuPackager

package_entry:
  usage: platforms/emu/package/build.sh ${intermediate_dir} ${output_dir}
  keyword:
    - { type: success, word: "PACKAGE OK" }
    - { type: error,   word: "ERROR" }

bundle:
  - name: image_convert
    usage: platforms/emu/bundle/convert.sh ${pkg_dir}/work
    keyword:
      - { type: success, word: "Convert done" }
      - { type: error,   word: "ERROR" }

smoke_entry:
  usage: platforms/emu/smoke/run.sh ${pkg_dir}/work --report ${report_path}
  keyword:
    - { type: error,   word: "FATAL" }
    - { type: success, word: "SMOKE COMPLETE" }

output:
  format: tar.gz
  naming: "hw-{platform}-{version}-{commit_short}"
