platform: fpga
packager: FpgaPackager           # smartci/packaging/packager/fpga_packager.py 里 @register（Python 实现；可选，脚本不够时的逃生舱）

# 打包入口：联合产物 → 平台包（脚本化方式）
package_entry:
  usage: platforms/fpga/package/build.sh ${intermediate_dir} ${output_dir}
  keyword:
    - { type: success, word: "PACKAGE OK" }
    - { type: error,   word: "ERROR" }

# bundle：冒烟跑之前按顺序执行
# 每条直接渲染成 deploy.py 的 task（usage / keyword 透传）
bundle:
  - name: address_remap
    usage: platforms/fpga/bundle/remap.sh ${pkg_dir}/work --mode smoke
    keyword:
      - { type: success, word: "Remap done" }
      - { type: error,   word: "ERROR" }
  - name: sign
    usage: python platforms/fpga/bundle/sign.py ${pkg_dir}/work

# 冒烟入口：smartci 调起，脚本必须往 $SMARTCI_REPORT_PATH 写 JSON 报告
smoke_entry:
  usage: platforms/fpga/smoke/run.sh ${pkg_dir}/work --report ${report_path}
  keyword:
    - { type: error,   word: "FATAL" }
    - { type: success, word: "SMOKE COMPLETE" }

output:
  format: tar.gz
  naming: "hw-{platform}-{version}-{commit_short}"
