<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dsp-connect Debug Console</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }

/* 顶栏: 连接设置 */
.toolbar { background: #2d2d2d; padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #404040; }
.toolbar label { font-size: 13px; color: #888; }
.toolbar input { background: #3c3c3c; border: 1px solid #555; color: #d4d4d4; padding: 4px 8px; font-family: inherit; font-size: 13px; width: 140px; border-radius: 3px; }
.toolbar input#port { width: 70px; }
.toolbar button { background: #0e639c; color: #fff; border: none; padding: 5px 14px; cursor: pointer; font-size: 13px; border-radius: 3px; }
.toolbar button:hover { background: #1177bb; }
.toolbar button.danger { background: #c53535; }
.toolbar button.danger:hover { background: #d44; }
.status { font-size: 12px; margin-left: auto; }
.status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.dot.on { background: #4ec9b0; }
.dot.off { background: #f44; }

/* 终端输出区 */
#output { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.cmd-line { color: #569cd6; }
.resp-line { color: #d4d4d4; }
.err-line { color: #f44747; }

/* 输入栏 */
.input-bar { display: flex; border-top: 1px solid #404040; background: #2d2d2d; }
.input-bar span { padding: 8px 4px 8px 16px; color: #4ec9b0; font-size: 14px; }
.input-bar input { flex: 1; background: transparent; border: none; color: #d4d4d4; font-family: inherit; font-size: 14px; padding: 8px; outline: none; }
</style>
</head>
<body>

<div class="toolbar">
    <label>Host:</label>
    <input type="text" id="host" value="{{ host }}">
    <label>Port:</label>
    <input type="text" id="port" value="{{ port }}">
    <button id="btn-connect" onclick="doConnect()">Connect</button>
    <button class="danger" onclick="doDisconnect()">Disconnect</button>
    <div class="status">
        <span class="dot {{ 'on' if connected else 'off' }}" id="dot"></span>
        <span id="status-text">{{ 'Connected' if connected else 'Disconnected' }}</span>
    </div>
</div>

<div id="output"></div>

<div class="input-bar">
    <span>dsc&gt;</span>
    <input type="text" id="cmd-input" placeholder="Enter command..." autofocus
           onkeydown="if(event.key==='Enter')sendCmd()">
</div>

<script>
const output = document.getElementById('output');
const cmdInput = document.getElementById('cmd-input');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');

// 命令历史
let history = [];
let histIdx = -1;
cmdInput.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') { e.preventDefault(); if (histIdx < history.length-1) { histIdx++; cmdInput.value = history[history.length-1-histIdx]; } }
    if (e.key === 'ArrowDown') { e.preventDefault(); if (histIdx > 0) { histIdx--; cmdInput.value = history[history.length-1-histIdx]; } else { histIdx=-1; cmdInput.value=''; } }
});

function appendLine(text, cls) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

function setStatus(connected) {
    dot.className = 'dot ' + (connected ? 'on' : 'off');
    statusText.textContent = connected ? 'Connected' : 'Disconnected';
}

function doConnect() {
    const host = document.getElementById('host').value;
    const port = document.getElementById('port').value;
    fetch('/connect', { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body: `host=${host}&port=${port}` })
    .then(r => r.json())
    .then(d => { appendLine(d.msg, d.ok ? 'resp-line' : 'err-line'); setStatus(d.ok); });
}

function doDisconnect() {
    fetch('/disconnect', { method: 'POST' })
    .then(r => r.json())
    .then(d => { appendLine(d.msg, 'resp-line'); setStatus(false); });
}

function sendCmd() {
    const cmd = cmdInput.value.trim();
    if (!cmd) return;
    history.push(cmd);
    histIdx = -1;
    appendLine('dsc> ' + cmd, 'cmd-line');
    cmdInput.value = '';

    fetch('/cmd', { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body: `cmd=${encodeURIComponent(cmd)}` })
    .then(r => r.json())
    .then(d => {
        if (d.ok) { appendLine(d.resp, 'resp-line'); }
        else { appendLine(d.msg, 'err-line'); setStatus(false); }
    });
}
</script>
</body>
</html>
